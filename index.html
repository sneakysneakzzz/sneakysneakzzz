<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Pro | Lebanon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-radius: 35px; }
        body { background: #f2f2f7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .ios-card { border-radius: var(--ios-radius); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: white; }
        .ios-card:active { transform: scale(0.96); }
        .panel { position: fixed; inset: 0; z-index: 100; display: none; align-items: flex-end; background: rgba(0,0,0,0.3); }
        .panel.active { display: flex; }
        .panel-content { width: 100%; background: white; border-radius: 40px 40px 0 0; padding: 30px; max-height: 92vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        .order-card.expanded .details { display: block; }
        .details { display: none; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass p-5 flex justify-between items-center">
        <button onclick="toggle('opt-p')" class="w-11 h-11 bg-gray-100 rounded-full flex items-center justify-center font-bold text-xl active:bg-gray-200">•••</button>
        <span class="font-black tracking-tighter text-2xl italic text-slate-800 uppercase">Vault</span>
        <button onclick="toggle('cart-p')" class="bg-black text-white px-6 py-2.5 rounded-full text-xs font-black shadow-xl active:opacity-80">
            Bag (<span id="count">0</span>)
        </button>
    </nav>

    <main id="grid" class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4 pb-24 text-center">
        <p class="col-span-full py-20 text-gray-400 font-medium italic">Loading the vault...</p>
    </main>

    <div id="opt-p" class="panel" onclick="closeP(event, 'opt-p')">
        <div class="panel-content text-center pb-14">
            <h3 class="font-black text-2xl mb-8 italic">Follow Us</h3>
            <div class="grid grid-cols-2 gap-4">
                <a id="ig" href="#" target="_blank" class="p-6 bg-gradient-to-tr from-purple-600 to-pink-500 text-white rounded-[30px] font-black shadow-lg">Instagram</a>
                <a id="tk" href="#" target="_blank" class="p-6 bg-black text-white rounded-[30px] font-black shadow-lg">TikTok</a>
            </div>
        </div>
    </div>

    <div id="cart-p" class="panel" onclick="closeP(event, 'cart-p')">
        <div class="panel-content space-y-5">
            <h2 class="text-3xl font-black mb-2">My Bag</h2>
            <div id="items" class="space-y-3"></div>
            
            <div class="space-y-3 pt-2">
                <div class="grid grid-cols-2 gap-3">
                    <input id="city" placeholder="City" class="p-4 bg-gray-100 rounded-2xl outline-none">
                    <input id="dist" placeholder="District" class="p-4 bg-gray-100 rounded-2xl outline-none">
                </div>
                <input id="bld" placeholder="Building, Floor, Apartment" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
                <input id="ph" type="tel" placeholder="WhatsApp Number" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
                <select id="pay" class="w-full p-4 bg-gray-100 rounded-2xl font-bold appearance-none">
                    <option>Cash on Delivery</option>
                    <option>Whish Pay</option>
                </select>
            </div>

            <div class="p-6 bg-slate-900 text-white rounded-[32px] flex justify-between items-center shadow-2xl">
                <span class="font-bold text-gray-400 text-xs tracking-widest uppercase">Total Bill</span>
                <span id="total" class="font-black text-2xl">$0</span>
            </div>
            
            <button onclick="checkout()" class="w-full bg-blue-600 text-white p-5 rounded-[30px] font-black text-xl shadow-xl active:bg-blue-700 transition mb-6">Confirm Order</button>
        </div>
    </div>

    <div id="adm-p" class="panel">
        <div class="panel-content">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-red-600">Admin Mode</h2>
                <button onclick="toggle('adm-p')" class="bg-gray-100 px-4 py-2 rounded-full font-bold text-xs uppercase">Close</button>
            </div>
            
            <div class="space-y-4 border-b pb-8 mb-8">
                <p class="font-black text-xs uppercase text-gray-400 tracking-widest">New Arrival</p>
                <input id="n-name" placeholder="Shoe Name" class="w-full border p-4 rounded-2xl outline-none">
                <input id="n-price" type="number" placeholder="Price ($)" class="w-full border p-4 rounded-2xl outline-none">
                <input id="n-img" placeholder="Image URL (Pinterest Link)" class="w-full border p-4 rounded-2xl outline-none">
                <button onclick="addProd()" class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">Add to Live Store</button>
            </div>

            <div class="space-y-4 border-b pb-8 mb-8">
                <p class="font-black text-xs uppercase text-gray-400 tracking-widest">Delivery & Socials</p>
                <input id="a-fee" placeholder="Delivery Fee ($)" class="border p-4 rounded-2xl w-full">
                <input id="a-ig" placeholder="Instagram Link" class="border p-4 rounded-2xl w-full">
                <input id="a-tk" placeholder="TikTok Link" class="border p-4 rounded-2xl w-full">
                <button onclick="saveSet()" class="w-full bg-black text-white p-4 rounded-2xl font-bold">Update Config</button>
            </div>

            <h3 class="font-black text-xl mb-4 italic">Customer Orders</h3>
            <input id="search" onkeyup="drawLog()" placeholder="Search Phone/Order ID..." class="w-full p-4 bg-gray-100 rounded-2xl mb-4 outline-none text-sm">
            <div id="log" class="space-y-4 pb-20"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- YOUR SNEAKY SNEAKZZ CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBtmroTGfgqw5Lt2MkThD4dqE-ZHnOye1U",
            authDomain: "shoe-vault-1babe.firebaseapp.com",
            projectId: "shoe-vault-1babe",
            storageBucket: "shoe-vault-1babe.firebasestorage.app",
            messagingSenderId: "433693979963",
            appId: "1:433693979963:web:ad680fea10ff0d418eb31e",
            databaseURL: "https://shoe-vault-1babe-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // App State
        window.shoes = []; window.orders = []; window.cfg = {fee:5, ig:'#', tk:'#'}; let cart = [];

        // UI Toggles
        window.toggle = (id) => document.getElementById(id).classList.toggle('active');
        window.closeP = (e, id) => { if(e.target.id === id) toggle(id); };

        // REALTIME SYNC: This runs every time the Database changes!
        onValue(ref(db, 'shoes'), (snap) => { 
            const v = snap.val(); 
            window.shoes = v ? Object.values(v) : []; 
            drawProducts(); 
        });

        onValue(ref(db, 'orders'), (snap) => { 
            const v = snap.val(); 
            window.orders = v ? Object.values(v).reverse() : []; 
            drawLog(); 
        });

        onValue(ref(db, 'config'), (snap) => { 
            const v = snap.val(); 
            if(v) window.cfg = v; 
            drawProducts(); 
        });

        function drawProducts() {
            const grid = document.getElementById('grid');
            if(window.shoes.length === 0) {
                grid.innerHTML = '<p class="col-span-full py-20 text-gray-400 italic">No shoes in stock. Open Admin (Shift+G+H) to add some!</p>';
                return;
            }
            grid.innerHTML = window.shoes.map(s => `
                <div class="ios-card p-3 shadow-sm flex flex-col h-full border border-gray-50">
                    <img src="${s.img}" class="w-full h-40 object-cover rounded-[25px] mb-3 bg-gray-100">
                    <p class="text-[12px] font-bold text-slate-800 truncate px-1">${s.name}</p>
                    <p class="text-blue-600 font-black text-base px-1 mb-3">$${s.price}</p>
                    <button onclick="add(${s.id})" class="mt-auto bg-slate-50 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest active:bg-slate-200 transition">Add to Bag</button>
                    ${document.getElementById('adm-p').classList.contains('active') ? `<button onclick="delShoe(${s.id})" class="text-[9px] text-red-500 mt-3 font-bold uppercase underline">Delete Cloud Item</button>` : ''}
                </div>
            `).join('');
            document.getElementById('ig').href = window.cfg.ig;
            document.getElementById('tk').href = window.cfg.tk;
        }

        window.add = (id) => {
            let s = window.shoes.find(x => x.id === id);
            let ex = cart.find(x => x.id === id);
            ex ? ex.q++ : cart.push({...s, q:1});
            updateCart();
        };

        function updateCart() {
            document.getElementById('count').innerText = cart.reduce((a,b)=>a+b.q,0);
            document.getElementById('items').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                    <span class="font-bold text-sm">${i.name}</span>
                    <div class="flex items-center gap-4">
                        <button onclick="chg(${i.id},-1)" class="w-7 h-7 bg-white rounded-full shadow-sm font-bold">-</button>
                        <span class="font-black">${i.q}</span>
                        <button onclick="chg(${i.id},1)" class="w-7 h-7 bg-white rounded-full shadow-sm font-bold">+</button>
                    </div>
                </div>
            `).join('');
            let sub = cart.reduce((a,b)=>a+(b.price*b.q),0);
            document.getElementById('total').innerText = `$${sub + Number(window.cfg.fee)}`;
        }

        window.chg = (id,d) => {
            let i = cart.find(x=>x.id===id); i.q+=d;
            if(i.q < 1) cart = cart.filter(x=>x.id!==id);
            updateCart();
        };

    window.checkout = () => {
    let ph = document.getElementById('ph').value;
    let paymentMethod = document.getElementById('pay').value;
    
    if(!ph || cart.length === 0) return alert("Missing items or Phone number!");
    
    let tid = "ORD-"+Math.floor(Math.random()*8999+1000);
    let order = {
        id: tid, 
        ph, 
        loc: `${document.getElementById('city').value}, ${document.getElementById('dist').value}`,
        bld: document.getElementById('bld').value,
        pay: paymentMethod,
        total: document.getElementById('total').innerText,
        items: cart.map(i=>`${i.q}x ${i.name}`).join(', '),
        time: new Date().toLocaleString()
    };

    // 1. Save to Firebase (So YOU see it in Admin)
    set(push(ref(db, 'orders')), order).then(() => {
        alert("Order Received!");

        // 2. CHECK: If it's Whish Pay, go to the receipt page
        if (paymentMethod === "Whish Pay") {
            // This sends them to whish.html and passes the Order ID and Total in the link
            window.location.href = `whish.html?id=${tid}&total=${order.total}`;
        } else {
            // If it's Cash, just clear the cart and stay home
            cart = []; 
            updateCart(); 
            toggle('cart-p');
        }
    });
};
        // ADMIN ACCESS: Hold Shift + G + H
        let keys = {};
        window.onkeydown = (e) => {
            keys[e.key] = true;
            if(keys['Shift'] && keys['G'] && keys['H']) {
                if(prompt("Vault Access Key:") === "admin123") {
                    document.getElementById('a-fee').value = window.cfg.fee;
                    document.getElementById('a-ig').value = window.cfg.ig;
                    document.getElementById('a-tk').value = window.cfg.tk;
                    toggle('adm-p');
                    drawProducts(); 
                }
                keys = {};
            }
        };
        window.onkeyup = (e) => keys[e.key] = false;

        window.addProd = () => {
            let n = document.getElementById('n-name').value;
            let p = document.getElementById('n-price').value;
            let i = document.getElementById('n-img').value;
            if(!n || !p || !i) return alert("Fill everything!");
            let id = Date.now();
            set(ref(db, 'shoes/' + id), { id, name: n, price: p, img: i });
            alert("Live!");
        }

        window.delShoe = (id) => { if(confirm("Remove from store?")) set(ref(db, 'shoes/' + id), null); };

        window.saveSet = () => {
            set(ref(db, 'config'), { 
                fee: document.getElementById('a-fee').value, 
                ig: document.getElementById('a-ig').value, 
                tk: document.getElementById('a-tk').value 
            });
            alert("Store Updated!");
        };

        window.drawLog = () => {
            let q = document.getElementById('search').value.toLowerCase();
            document.getElementById('log').innerHTML = window.orders.filter(o=>o.ph.includes(q)||o.id.toLowerCase().includes(q)).map(o => `
                <div class="bg-gray-50 p-5 rounded-[30px] active:scale-98 shadow-sm" onclick="this.classList.toggle('expanded')">
                    <div class="flex justify-between font-black text-sm"><span>#${o.id}</span><span class="text-blue-600">${o.total}</span></div>
                    <div class="flex justify-between text-[10px] font-bold uppercase mt-1">
                        <span class="text-gray-400">${o.ph}</span>
                        <span class="text-gray-400">${o.pay}</span>
                    </div>
                    <div class="details text-[11px] mt-4 border-t pt-4 space-y-2 leading-relaxed">
                        <p>👟 <b>Cart:</b> ${o.items}</p>
                        <p>📍 <b>Area:</b> ${o.loc}</p>
                        <p>🏢 <b>Address:</b> ${o.bld}</p>
                        <p>⏰ <b>Time:</b> ${o.time}</p>
                        <a href="https://wa.me/961${o.ph}" target="_blank" class="inline-block mt-3 bg-green-500 text-white px-5 py-2 rounded-full font-black uppercase text-[9px]">WhatsApp Customer</a>
                    </div>
                </div>
            `).join('');
        };
    </script>
</body>
</html>
