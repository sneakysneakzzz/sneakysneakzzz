
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Pro | Lebanon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-radius: 35px; }
        body { background: #f2f2f7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .ios-card { border-radius: var(--ios-radius); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: white; height: 100%; display: flex; flex-direction: column; }
        .ios-card:active { transform: scale(0.96); }
        .panel { position: fixed; inset: 0; z-index: 100; display: none; align-items: flex-end; background: rgba(0,0,0,0.3); }
        .panel.active { display: flex; }
        .panel-content { width: 100%; background: white; border-radius: 40px 40px 0 0; padding: 30px; max-height: 92vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        .details { display: none; }
        .expanded .details { display: block; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass p-5 flex justify-between items-center">
        <button onclick="toggle('opt-p')" class="w-11 h-11 bg-gray-100 rounded-full flex items-center justify-center font-bold text-xl active:bg-gray-200">•••</button>
        <span class="font-black tracking-tighter text-2xl italic text-slate-800 uppercase">Vault</span>
        <button onclick="toggle('cart-p')" class="bg-black text-white px-6 py-2.5 rounded-full text-xs font-black shadow-xl active:opacity-80">
            Bag (<span id="count">0</span>)
        </button>
    </nav>

    <main id="grid" class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4 pb-24 text-center">
        <p class="col-span-full py-20 text-gray-400 italic">Syncing with Vault...</p>
    </main>

    <div id="opt-p" class="panel" onclick="closeP(event, 'opt-p')">
        <div class="panel-content text-center pb-14">
            <h3 class="font-black text-2xl mb-8 italic">Vault Socials</h3>
            <div class="flex flex-col gap-4">
                <a id="ig" href="#" target="_blank" class="p-5 bg-gradient-to-r from-purple-600 to-pink-500 text-white rounded-2xl font-black shadow-lg">Instagram</a>
                <a id="tk" href="#" target="_blank" class="p-5 bg-black text-white rounded-2xl font-black shadow-lg">TikTok</a>
                <a id="wa-link" href="#" target="_blank" class="p-5 bg-green-500 text-white rounded-2xl font-black shadow-lg">WhatsApp Us</a>
            </div>
        </div>
    </div>

    <div id="cart-p" class="panel" onclick="closeP(event, 'cart-p')">
        <div class="panel-content space-y-5">
            <h2 class="text-3xl font-black">My Bag</h2>
            <div id="items" class="space-y-2"></div>
            
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input id="city" placeholder="City" class="p-4 bg-gray-100 rounded-2xl outline-none">
                    <input id="dist" placeholder="District" class="p-4 bg-gray-100 rounded-2xl outline-none">
                </div>
                <input id="bld" placeholder="Building / Floor / Apartment" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
                <input id="ph" type="tel" placeholder="WhatsApp Phone Number" class="w-full p-4 bg-gray-100 rounded-2xl outline-none">
                <select id="pay" class="w-full p-4 bg-gray-100 rounded-2xl font-bold appearance-none">
                    <option value="Cash on Delivery">Cash on Delivery</option>
                    <option value="Whish Pay">Whish Pay</option>
                </select>
            </div>

            <div class="p-6 bg-slate-900 text-white rounded-[32px] flex justify-between items-center shadow-2xl">
                <span class="font-bold text-gray-400 text-xs uppercase">Total + Fee</span>
                <span id="total" class="font-black text-2xl">$0</span>
            </div>
            
            <button onclick="checkout()" class="w-full bg-blue-600 text-white p-5 rounded-[30px] font-black text-xl shadow-xl active:bg-blue-700 transition mb-6">Confirm Order</button>
        </div>
    </div>

    <div id="adm-p" class="panel">
        <div class="panel-content">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black text-red-600 uppercase italic">Admin Console</h2>
                <button onclick="toggle('adm-p')" class="bg-gray-100 px-4 py-2 rounded-full font-bold text-xs">CLOSE</button>
            </div>
            
            <div class="space-y-4 border-b pb-8 mb-8">
                <p class="font-black text-xs text-gray-400 uppercase tracking-widest">Inventory Management</p>
                <input id="n-name" placeholder="Shoe Name" class="w-full border p-4 rounded-2xl outline-none">
                <input id="n-price" type="number" placeholder="Price ($)" class="w-full border p-4 rounded-2xl outline-none">
                <input id="n-img" placeholder="Image URL" class="w-full border p-4 rounded-2xl outline-none">
                <button onclick="addProd()" class="w-full bg-green-500 text-white p-4 rounded-2xl font-bold shadow-lg">Add Product</button>
            </div>

            <div class="space-y-4 border-b pb-8 mb-8">
                <p class="font-black text-xs text-gray-400 uppercase tracking-widest">Store Configuration</p>
                <input id="a-fee" placeholder="Delivery Fee ($)" class="border p-4 rounded-2xl w-full outline-none">
                <input id="a-ig" placeholder="Instagram URL" class="border p-4 rounded-2xl w-full outline-none">
                <input id="a-tk" placeholder="TikTok URL" class="border p-4 rounded-2xl w-full outline-none">
                <input id="a-wa" placeholder="Your WhatsApp (961...)" class="border p-4 rounded-2xl w-full outline-none">
                <button onclick="saveSet()" class="w-full bg-black text-white p-4 rounded-2xl font-bold">Update Store</button>
            </div>

            <h3 class="font-black text-xl mb-4 italic text-slate-800">Order Logs</h3>
            <div id="log" class="space-y-4 pb-20"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtmroTGfgqw5Lt2MkThD4dqE-ZHnOye1U",
            authDomain: "shoe-vault-1babe.firebaseapp.com",
            projectId: "shoe-vault-1babe",
            storageBucket: "shoe-vault-1babe.firebasestorage.app",
            messagingSenderId: "433693979963",
            appId: "1:433693979963:web:ad680fea10ff0d418eb31e",
            databaseURL: "https://shoe-vault-1babe-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.shoes = []; window.orders = []; window.cfg = {fee:5, ig:'#', tk:'#', wa:'96170123456'}; let cart = [];

        onValue(ref(db, 'shoes'), (snap) => { window.shoes = snap.val() ? Object.values(snap.val()) : []; drawProducts(); });
        onValue(ref(db, 'orders'), (snap) => { window.orders = snap.val() ? Object.values(snap.val()).reverse() : []; drawLog(); });
        onValue(ref(db, 'config'), (snap) => { if(snap.val()) window.cfg = snap.val(); updateUI(); });

        function updateUI() {
            document.getElementById('ig').href = window.cfg.ig;
            document.getElementById('tk').href = window.cfg.tk;
            document.getElementById('wa-link').href = `https://wa.me/${window.cfg.wa}`;
            drawProducts();
        }

        function drawProducts() {
            const grid = document.getElementById('grid');
            grid.innerHTML = window.shoes.length ? window.shoes.map(s => `
                <div class="ios-card p-3 shadow-sm border border-gray-50">
                    <img src="${s.img}" class="w-full h-40 object-cover rounded-[25px] mb-3 bg-gray-50">
                    <p class="text-[12px] font-bold text-slate-800 truncate px-1">${s.name}</p>
                    <p class="text-blue-600 font-black text-base px-1 mb-3">$${s.price}</p>
                    <button onclick="addToBag(${s.id})" class="mt-auto bg-slate-100 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest active:bg-slate-200 transition">Add to Bag</button>
                    ${document.getElementById('adm-p').classList.contains('active') ? `<button onclick="delShoe(${s.id})" class="text-[9px] text-red-500 mt-3 font-bold uppercase underline">Delete</button>` : ''}
                </div>
            `).join('') : '<p class="col-span-full py-20 text-gray-400">Store is empty.</p>';
        }

        window.addToBag = (id) => {
            let s = window.shoes.find(x => x.id === id);
            let ex = cart.find(x => x.id === id);
            ex ? ex.q++ : cart.push({...s, q:1});
            updateCart();
        };

        function updateCart() {
            document.getElementById('count').innerText = cart.reduce((a,b)=>a+b.q,0);
            let sub = cart.reduce((a,b)=>a+(Number(b.price)*b.q),0);
            document.getElementById('total').innerText = `$${sub + Number(window.cfg.fee)}`;
            document.getElementById('items').innerHTML = cart.map(i => `<div class="p-4 bg-gray-50 rounded-2xl font-bold text-sm flex justify-between"><span>${i.name}</span><span>${i.q}x</span></div>`).join('');
        }

        window.checkout = () => {
            let ph = document.getElementById('ph').value;
            let method = document.getElementById('pay').value;
            let totalVal = document.getElementById('total').innerText;
            if(!ph || cart.length === 0) return alert("Please fill cart and phone!");
            
            let tid = "ORD-" + Math.floor(Math.random()*8999+1000);
            let order = { 
                id: tid, ph, pay: method, total: totalVal, 
                loc: `${document.getElementById('city').value}, ${document.getElementById('dist').value}`,
                bld: document.getElementById('bld').value,
                items: cart.map(i=>`${i.q}x ${i.name}`).join(', '), 
                time: new Date().toLocaleString() 
            };

            set(push(ref(db, 'orders')), order).then(() => {
                if (method === "Whish Pay") {
                    let msg = `Whish Pay Receipt for ${tid}%0ATotal: ${totalVal}%0AItems: ${order.items}`;
                    window.location.href = `https://wa.me/${window.cfg.wa}?text=${msg}`;
                } else {
                    alert("Order Confirmed! We will call you."); 
                    cart = []; updateCart(); toggle('cart-p');
                }
            });
        };

        window.toggle = (id) => { document.getElementById(id).classList.toggle('active'); if(id === 'adm-p') drawProducts(); };
        window.closeP = (e, id) => { if(e.target.id === id) toggle(id); };

        let keys = {};
        window.onkeydown = (e) => {
            keys[e.key] = true;
            if(keys['Shift'] && keys['G'] && keys['H']) {
                if(prompt("Admin Key:") === "admin123") {
                    document.getElementById('a-fee').value = window.cfg.fee;
                    document.getElementById('a-ig').value = window.cfg.ig;
                    document.getElementById('a-tk').value = window.cfg.tk;
                    document.getElementById('a-wa').value = window.cfg.wa;
                    toggle('adm-p');
                }
                keys = {};
            }
        };
        window.onkeyup = (e) => keys[e.key] = false;

        window.addProd = () => {
            let n = document.getElementById('n-name').value;
            let p = document.getElementById('n-price').value;
            let i = document.getElementById('n-img').value;
            let id = Date.now();
            set(ref(db, 'shoes/' + id), { id, name: n, price: p, img: i }).then(() => alert("Product Live!"));
        };

        window.delShoe = (id) => { if(confirm("Permanently delete?")) remove(ref(db, 'shoes/' + id)); };
        
        window.saveSet = () => {
            set(ref(db, 'config'), { 
                fee: document.getElementById('a-fee').value, 
                ig: document.getElementById('a-ig').value, 
                tk: document.getElementById('a-tk').value,
                wa: document.getElementById('a-wa').value
            }).then(() => alert("Store Config Updated!"));
        };

        window.drawLog = () => {
            document.getElementById('log').innerHTML = window.orders.map(o => `
                <div class="bg-gray-50 p-5 rounded-[30px] shadow-sm mb-3" onclick="this.classList.toggle('expanded')">
                    <div class="flex justify-between font-black text-sm"><span>#${o.id}</span><span class="text-blue-600">${o.total}</span></div>
                    <div class="details text-[11px] mt-4 border-t pt-4 space-y-2">
                        <p>👟 <b>Cart:</b> ${o.items}</p>
                        <p>📞 <b>Phone:</b> ${o.ph}</p>
                        <p>📍 <b>Area:</b> ${o.loc}</p>
                        <p>🏢 <b>Address:</b> ${o.bld}</p>
                        <p>💳 <b>Payment:</b> ${o.pay}</p>
                        <p>⏰ <b>Time:</b> ${o.time}</p>
                        <a href="https://wa.me/${o.ph.startsWith('961') ? o.ph : '961'+o.ph}" target="_blank" class="inline-block mt-3 bg-green-500 text-white px-5 py-2 rounded-full font-black uppercase text-[9px]">WhatsApp Chat</a>
                    </div>
                </div>
            `).join('');
        };
    </script>
</body>
</html>
